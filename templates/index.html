<!-- ================= AUTH ROUTES ================= -->

<!-- Check User Exists -->
<!DOCTYPE html>
<html>
<head><title>Check User Exists</title></head>
<body>
<h2>Check User Exists</h2>
<form id="existsForm">
  <input type="text" id="user_id" placeholder="User ID" required><br>
  <input type="password" id="password" placeholder="Password" required><br>
  <input type="text" id="display_name" placeholder="Display Name"><br>
  <button type="submit">Send</button>
</form>
<pre id="result"></pre>
<script>
document.getElementById('existsForm').onsubmit = async (e) => {
  e.preventDefault();
  const res = await fetch('/api/auth/exists', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      user_id: user_id.value,
      password: password.value,
      display_name: display_name.value
    })
  });
  result.textContent = JSON.stringify(await res.json(), null, 2);
};
</script>
</body>
</html>

<!-- ================= GENERIC TEMPLATE ================= -->

<!DOCTYPE html>
<html>
<head>
  <title>Generic API Tester</title>
</head>
<body>
<h2>API Tester</h2>
<input id="url" placeholder="Endpoint URL"><br>
<select id="method">
  <option>GET</option>
  <option>POST</option>
  <option>PUT</option>
  <option>DELETE</option>
</select><br>
<textarea id="body" placeholder="JSON Body"></textarea><br>
<button onclick="send()">Send</button>
<pre id="res"></pre>
<script>
async function send(){
  const resq = await fetch(url.value,{
    method: method.value,
    headers:{'Content-Type':'application/json'},
    body: method.value==='GET'?null:body.value
  });
  res.textContent = JSON.stringify(await resq.json(),null,2);
}
</script>
</body>
</html>
