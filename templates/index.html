<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code-Till-Failure</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 16px 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    nav {
      margin-top: 10px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      padding: 8px 12px;
      background: var(--panel-2);
      border-radius: 8px;
    }

    main {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px 40px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-2 {
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    input, select, textarea, button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: var(--primary);
      color: #04120a;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .row > * {
      flex: 1;
    }

    .result, .list {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      background: #0b1220;
      border: 1px solid var(--border);
      overflow-x: auto;
      white-space: pre-wrap;
    }

    .item {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      background: #0b1220;
    }

    .item h3 {
      margin: 0 0 8px;
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .danger {
      background: var(--danger);
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>Code-Till-Failure</h1>
    <nav>
      <a href="auth.html">Auth</a>
      <a href="roads.html">Roads</a>
      <a href="shops.html">Shops</a>
    </nav>
  </header>

  <main>
    <div class="card">
      <h2>Welcome</h2>
      <p class="muted">Choose a section above to manage users, road reports, and shops.</p>
    </div>
  </main>
</body>
</html>
